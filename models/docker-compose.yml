# Independent compose project for ANILA inference workloads.
#
# Goals:
#   * Lifecycle decoupled from the platform stack (`docker compose -f
#     docker-compose.yml restart csp` does NOT touch these containers)
#   * No host port exposure — every service uses `expose:` (internal-only)
#     so the host's external NICs cannot reach them; CSP talks via the
#     shared external `anila-models-net` docker network DNS
#   * Mirror the GPU layout previously deployed by
#     /home/aia/c1147259/project/My-OpenAI-Frontend/docker-compose.migration.yml
#     so the cutover is a stop-and-swap, not a redesign
#
# Bootstrap (one-time, on the host):
#     docker network create anila-models-net
#     docker compose -f docker-compose.yml restart csp   # CSP joins the net
#
# Day-to-day:
#     docker compose -f models/docker-compose.yml up -d
#     docker compose -f models/docker-compose.yml logs -f gemma4
#     docker compose -f models/docker-compose.yml ps
#     docker compose -f models/docker-compose.yml restart gemma4
#     docker compose -f models/docker-compose.yml down            # 模型 only,平台不動
#
# Endpoint URLs registered in CSP model_registry (走 docker DNS,
# host port 完全沒開):
#     http://gpt-oss-20b:8000/v1
#     http://gemma4:8000/v1
#     http://nv-embed-proxy:8000/v1
#
# Project name "anila-models" 跟平台 "anila-platform" 不同,
# `docker compose down` (在 repo 根目錄) 不會誤殺這邊。

name: anila-models

services:
  # ── LLM 1: gpt-oss-20b on GPU 2 ────────────────────────────────────────────
  # TensorRT-LLM OpenAI-compat server (port 8000 internal). Image / runtime
  # config mirrors My-OpenAI-Frontend/docker-compose.migration.yml as of
  # 2026-05-11 — change carefully and document in the runbook.
  gpt-oss-20b:
    image: tensorrt-llm-hf:1.3.0rc10
    container_name: anila-model-gpt-oss-20b
    environment:
      TZ: Asia/Taipei
      TIKTOKEN_ENCODINGS_BASE: /etc/encodings
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    volumes:
      - /home/aia/c1147259/project/Huggingface/gpt-oss-20b:/workspace/model/gpt-oss-20b
      - /home/aia/c1147259/project/Docker/tensorrtllm-1.2.0rc5-openai-gpt-oss-20b/encodings:/etc/encodings/:ro
      - /home/aia/c1147259/project/Docker/tensorrtllm-1.2.0rc5-openai-gpt-oss-20b:/workspace/src
    working_dir: /workspace
    expose:
      - "8000"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["2"]
              capabilities: [gpu]
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    command: >
      trtllm-serve /workspace/model/gpt-oss-20b
        --extra_llm_api_options /workspace/src/gpt-oss-20b-throughput.yaml
        --kv_cache_free_gpu_memory_fraction 0.5
        --host 0.0.0.0
        --port 8000
    networks: [models]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 120s

  # ── LLM 2: gemma-4-31B-it + MTP drafter on GPU 3 ───────────────────────────
  # vLLM OpenAI-compat server; ``served-model-name=gemma4`` so the CSP
  # model_registry can register the row as ``gemma4`` and have the agent /
  # router fan-out keep the same id everywhere.
  #
  # MTP (Multi-Token Prediction) speculative decoding — 2026-05-05 release:
  #   * Google 發佈了 ``gemma-4-31B-it-assistant`` 小頭模型,跟 target 共用
  #     KV cache,實測 1.7–2.2× 加速 (conversational > code)。
  #   * 需要 vLLM ≥ 0.18 含 PR #41745 (Gemma4 MTP spec-decode 支援)。
  #     若 ``vllm-gemma4:latest`` 是舊版,啟動會報 ``unknown speculative
  #     method 'mtp'`` 直接退出 — rebuild image 升 vLLM 即可。
  #   * Offline 模式 (HF_HUB_OFFLINE=1) 不能讓 vLLM 自己去 HF 抓 assistant,
  #     一次性下載到本機:
  #         huggingface-cli download google/gemma-4-31B-it-assistant \
  #             --local-dir /home/aia/c1147259/project/Huggingface/gemma-4-31B-it-assistant
  #   * num_speculative_tokens=4 是 31B 的甜蜜點 (官方 recipe);拉太大
  #     reject rate 會升高,反而變慢。
  gemma4:
    image: vllm-gemma4:latest
    container_name: anila-model-gemma4
    environment:
      TZ: Asia/Taipei
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
      # vLLM ≥0.21 預設啟用 CUDA graph memory profiler,會額外保留 ~0.92 GiB
      # 並從 KV cache budget 扣掉。我們需要保留 131072 context, 改為關掉 profiler
      # 把這 0.92 GiB 還給 KV cache (代價: 大 batch 動態擴 CUDA graph 時可能 OOM)。
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"
    volumes:
      - /home/aia/c1147259/project/Huggingface/gemma-4-31B-it:/workspace/model/gemma-4-31B-it
      - /home/aia/c1147259/project/Huggingface/gemma-4-31B-it-assistant:/workspace/model/gemma-4-31B-it-assistant
    working_dir: /workspace
    expose:
      - "8000"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["3"]
              capabilities: [gpu]
    shm_size: 64g
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    command: >
      --model /workspace/model/gemma-4-31B-it
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 1
      --dtype bfloat16
      --max-model-len 131072
      --gpu-memory-utilization 0.97
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --served-model-name gemma4
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --speculative-config '{"method":"mtp","model":"/workspace/model/gemma-4-31B-it-assistant","num_speculative_tokens":2}'
      --default-chat-template-kwargs '{"enable_thinking": true}'
      --override-generation-config '{"skip_special_tokens": false}'
    networks: [models]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  # ── Embedding backend: Triton on GPU 0 (no expose, fully internal) ─────────
  # CSP doesn't speak Triton protocol — only the `nv-embed-proxy` sibling
  # below talks to it via internal DNS. Triton therefore has neither
  # `expose:` nor `ports:`; it's reachable only by container-to-container
  # traffic inside the `anila-models-net` network.
  nv-embed-triton:
    image: tritonserver:25.04-nv-embed-v2
    container_name: anila-model-nv-embed-triton
    environment:
      TZ: Asia/Taipei
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    volumes:
      - /home/aia/c1147259/project/Huggingface/NV-Embed-v2:/workspace/model/NV-Embed-v2
      - /home/aia/c1147259/project/Docker/tritonserver-25.04-nv-embed-v2/repository:/workspace/repository
      - /home/aia/c1147259/project/Docker/tritonserver-25.04-nv-embed-v2:/workspace/src
    working_dir: /workspace
    # 沒 expose 也沒 ports — 完全 cluster-internal,讓 attack surface 更小
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    command: >
      tritonserver --model-repository=/workspace/repository
                   --model-control-mode=poll
                   --repository-poll-secs=1
    networks: [models]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v2/health/ready > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ── Embedding FastAPI shim (OpenAI /v1/embeddings front for Triton) ────────
  # This is what CSP actually registers. Bridges OpenAI v1 embeddings shape
  # to Triton's protocol via the internal `nv-embed-triton` hostname.
  nv-embed-proxy:
    image: embedding-proxy:migration
    container_name: anila-model-nv-embed-proxy
    build:
      context: /home/aia/c1147259/project/My-OpenAI-Frontend/embedding_proxy
    environment:
      TZ: Asia/Taipei
      TRITON_URL: http://nv-embed-triton:8000
      MODEL_NAME: nv-embed-v2
      REQUEST_TIMEOUT: "60"
    expose:
      - "8000"
    depends_on:
      nv-embed-triton:
        condition: service_healthy
    restart: unless-stopped
    networks: [models]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Image generation: FLUX.2-dev on GPU 1 + GPU 2 ─────────────────────────
  # bf16 dual-H100 via diffusers Flux2Pipeline (device_map="balanced").
  # No host port — agent shim is the only client. Soldier-facing UX
  # never sees this service directly; chat 走 router → DISPATCH:image-generator
  # → CSP proxy → flux2-dev-agent → flux2-dev.
  #
  # License caveat: black-forest-labs/FLUX.2-dev is BFL Non-Commercial.
  # Confirm authorization before enabling in production.
  flux2-dev:
    image: flux2-dev:bf16
    container_name: anila-model-flux2-dev
    build:
      context: ./flux2-dev
    environment:
      TZ: Asia/Taipei
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      FLUX_MODEL_PATH: /workspace/model/FLUX.2-dev
      FLUX_DEVICE_MAP: balanced
      FLUX_NUM_STEPS: "28"
      FLUX_GUIDANCE_SCALE: "3.5"
    volumes:
      - /home/aia/c1147259/project/Huggingface/FLUX.2-dev:/workspace/model/FLUX.2-dev:ro
    expose:
      - "8000"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1", "2"]
              capabilities: [gpu]
    shm_size: 32g
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    networks: [models]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ── Image generation agent shim (OpenAI compat front for flux2-dev) ───────
  # CSP registers THIS as the agent endpoint (model_type=agent). When
  # gemma4 emits DISPATCH:image-generator:..., CSP forwards the request
  # here. Shim handles prompt translation (zh→en via gemma4 callback)
  # and image persistence; binds /share/flux from share-dev/uploads/flux.
  flux2-dev-agent:
    image: anila-flux-agent:latest
    container_name: anila-model-flux2-dev-agent
    build:
      context: ./flux2-dev-agent
    environment:
      TZ: Asia/Taipei
      FLUX_BACKEND_URL: http://flux2-dev:8000
      CSP_BASE_URL: http://csp:8000
      CSP_API_KEY: ${INTERNAL_PLATFORM_API_KEY_DEV:-sk-internal-worker-dev-changeme}
      GEMMA_MODEL: gemma4
      ENABLE_PROMPT_TRANSLATION: "1"
      SHARE_DIR: /share/flux
      PUBLIC_URL_PREFIX: /uploads/flux
      DEFAULT_ASPECT_RATIO: "16:9"
      FLUX_TIMEOUT_SECONDS: "240"
    volumes:
      - /home/aia/c1147259/ANILA/share-dev/uploads/flux:/share/flux
    expose:
      - "8000"
    depends_on:
      flux2-dev:
        condition: service_healthy
    restart: unless-stopped
    networks: [models]
    healthcheck:
      # Agent image is python:3.11-slim and has no curl in PATH. Use urllib.
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  models:
    external: true
    name: anila-models-net
