# ANILA Platform — DEV stack for the feature/no-sso branch.
#
# 跟 docker-compose.yml 完全隔離（不同 project / network / 容器名 / port / volume），
# 因為 production stack `anila-platform` 還在外網被同事用，啟動 dev 不能撞它。
#
# 用法：
#   docker compose -f docker-compose-dev.yml up -d --build
#
# 對比 live stack：
#   ─────────────────────────────────────────────────────────
#   Live (anila-platform)             Dev (anila-platform-dev)
#   ─────────────────────────────────────────────────────────
#   nginx :80 / :443 / :4443          nginx :8080 / :8443 / :9443
#   csp-db 5433 (loopback)            csp-db 5533 (loopback)
#   csp-pgdata (volume)               csp-pgdata-dev
#   redis-data (volume)               redis-data-dev
#   ./share/uploads/                  ./share-dev/uploads/
#   network anila-net                 network anila-dev-net
#   container anila-nginx             container anila-nginx-dev
#   ─────────────────────────────────────────────────────────
#
# 共用：anila-models-net (external) — 兩 stack 都要打 gemma4 / gpt-oss-20b /
# nv-embed-proxy，這條 external network 同時 attach 不會破壞 live。

name: anila-platform-dev

services:

  # ── PostgreSQL (dev volume, dev port) ───────────────────────────────────
  csp-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: csp
      POSTGRES_PASSWORD: csp
      POSTGRES_DB: csp
    ports:
      - "127.0.0.1:5533:5432"
    volumes:
      - csp-pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csp -d csp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── CSP (Control + Data Plane :8000) ────────────────────────────────────
  csp:
    build:
      context: .
      dockerfile: myCSPPlatform/docker/Dockerfile
    expose:
      - "8000"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://csp_app:csp@csp-db:5432/csp
      MIGRATION_DATABASE_URL: postgresql://csp:csp@csp-db:5432/csp
      SECRET_KEY: ${CSP_SECRET_KEY:-dev-secret-key-change-in-prod}
      # Dev 寫死 "1"，不經 ${} 展開——避免被 .env 裡的 ANILA_ALLOW_DEV_SECRET=0
      # 鎖死。startup_security 在 dev 模式下只 log warning 不擋。
      ANILA_ALLOW_DEV_SECRET: "1"
      ANILA_ALLOW_HTTP_ENDPOINT: "${ANILA_ALLOW_HTTP_ENDPOINT:-}"
      ANILA_ALLOW_PRIVATE_ENDPOINT: "${ANILA_ALLOW_PRIVATE_ENDPOINT:-}"
      ANILA_TRUSTED_HOSTS: "${ANILA_TRUSTED_HOSTS:-gpt-oss-20b,gemma4,nv-embed-proxy,host.docker.internal}"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CSP_SERVICE_TOKEN: ${CSP_SERVICE_TOKEN:-dev-service-token}
      AUTO_REGISTER_MODELS: >-
        [{"name":"${LOCAL_LLM_MODEL:-gpt-oss-20b}","display_name":"${LOCAL_LLM_MODEL:-gpt-oss-20b}","model_type":"llm","endpoint_url":"${LOCAL_LLM_BASE_URL:-http://gpt-oss-20b:8000}","api_version":"v1","description":"On-prem local LLM (anila-models-net)"},{"name":"gemma4","display_name":"gemma4","model_type":"llm","endpoint_url":"http://gemma4:8000","api_version":"v1","description":"On-prem gemma4 vLLM (anila-models-net) — Router primary"},{"name":"${LOCAL_EMBEDDING_MODEL:-nvidia/NV-embed-V2}","display_name":"${LOCAL_EMBEDDING_MODEL:-nvidia/NV-embed-V2}","model_type":"embedding","endpoint_url":"${LOCAL_EMBEDDING_BASE_URL:-http://nv-embed-proxy:8000}","api_version":"v1","description":"On-prem NV-embed-V2 via FastAPI shim (anila-models-net)"},{"name":"image-generator","display_name":"圖像繪製","model_type":"agent","endpoint_url":"http://flux2-dev-agent:8000","api_version":"v1","description":"FLUX.2-dev image generation agent","description_for_router":"當使用者要求繪製、產生、設計、畫一張、給我一張圖、視覺化、想看看 XX 的樣子、想要看一張圖等等的時候使用。輸入是使用者的中文自然語言描述,不需要先翻譯,agent 內部會處理。"}]
      # Phase G：agents 表的 declarative 來源(不同於 model_registry,後者是 catalog;
      # agents 表才是 Router /v1/agents 與 DISPATCH 路徑會 join 的權限源)。
      AUTO_REGISTER_AGENTS: >-
        [{"name":"image-generator","endpoint_url":"http://flux2-dev-agent:8000","api_version":"v1","description_for_router":"當使用者要求繪製、產生、設計、畫一張、給我一張圖、視覺化、想看看 XX 的樣子、想要看一張圖等等的時候使用。輸入是使用者的中文自然語言描述,不需要先翻譯,agent 內部會處理。","health_status":"healthy","approval_status":"approved"}]
      # Dev 用獨立 seed key，跟 prod sk-test-user-api-key 區隔開——避免你拿 dev key
      # 不小心打到 prod CSP，或反過來。
      AUTO_SEED_API_KEYS: >-
        [{"username":"smoke-user","email":"smoke-user@example.com","role":"user","key":"${SMOKE_USER_API_KEY_DEV:-sk-test-dev-user-api-key}","key_name":"smoke-user-dev-key","models":["${LOCAL_LLM_MODEL:-gpt-oss-20b}","gemma4"],"agents":["image-generator"]},
         {"username":"ingestion-worker","email":"ingestion-worker@anila.local","role":"system","key":"${INTERNAL_PLATFORM_API_KEY_DEV:-sk-internal-worker-dev-changeme}","key_name":"ingestion-worker-system-key","models":["${LOCAL_EMBEDDING_MODEL:-nvidia/NV-embed-V2}"]}]
      AUTO_REGISTER_LINKS: >-
        [
          {"name":"ANILA LM","url":"/anilalm","icon":"book-open","description":"AI 學習內容生成","sort_order":1,"is_public":false,"required_roles":[]}
        ]
      ANILA_TEMPLATE_DIR: /app/anila-template
      INGESTION_UPLOAD_DIR: /var/anila/ingestion-uploads
      # FLUX image-gen for ANILALM studio pptx pipeline — wires
      # studio.image_provider.FluxImageProvider; empty BACKEND_URL
      # would make get_flux_provider() return None (toggle OFF).
      FLUX_BACKEND_URL: ${FLUX_BACKEND_URL:-http://flux2-dev:8000}
      FLUX_MAX_CONCURRENT: "${FLUX_MAX_CONCURRENT:-4}"
      FLUX_TIMEOUT_SECONDS: "${FLUX_TIMEOUT_SECONDS:-180}"
      # FLUX_CACHE_DIR defaults to $INGESTION_UPLOAD_DIR/flux-cache
    volumes:
      - ./anila-agent:/app/anila-template:ro
      # ⚠️ dev 用獨立 share 目錄，不撞 live stack 的 ./share/
      - ./share-dev/uploads/ingestion:/var/anila/ingestion-uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - anila-models-net
    depends_on:
      csp-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--maxmemory", "256mb"]
    volumes:
      - redis-data-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── ingestion-worker ────────────────────────────────────────────────────
  ingestion-worker:
    build:
      context: .
      dockerfile: ingestion-worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://csp_app:csp@csp-db:5432/csp
      REDIS_URL: redis://redis:6379
      EMBEDDING_BASE_URL: http://csp:8000/v1
      EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-nvidia/NV-embed-V2}
      EMBEDDING_API_KEY: ${INTERNAL_PLATFORM_API_KEY_DEV:-sk-internal-worker-dev-changeme}
      EMBEDDING_DIM: "4000"
      UPLOAD_DIR: /var/anila/ingestion-uploads
      SECRET_KEY: ${CSP_SECRET_KEY:-dev-secret-key-change-in-prod}
      ANILA_ALLOW_DEV_SECRET: "1"
      ANILA_ALLOW_HTTP_ENDPOINT: "${ANILA_ALLOW_HTTP_ENDPOINT:-}"
      ANILA_ALLOW_PRIVATE_ENDPOINT: "${ANILA_ALLOW_PRIVATE_ENDPOINT:-}"
      ENABLE_IMAGE_CAPTIONS: "${ENABLE_IMAGE_CAPTIONS:-true}"
      VISION_URL: "${VISION_URL:-http://csp:8000/v1}"
      VISION_MODEL: "${VISION_MODEL:-gemma4}"
      VISION_API_KEY: ${INTERNAL_PLATFORM_API_KEY_DEV:-sk-internal-worker-dev-changeme}
      VISION_VERIFY_SSL: "${VISION_VERIFY_SSL:-false}"
      VISION_CONCURRENCY: "${VISION_CONCURRENCY:-4}"
      VISION_TIMEOUT_SECONDS: "${VISION_TIMEOUT_SECONDS:-60}"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./share-dev/uploads/ingestion:/var/anila/ingestion-uploads
    depends_on:
      csp-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      csp:
        condition: service_healthy
    restart: unless-stopped

  # ── Router ──────────────────────────────────────────────────────────────
  router:
    build:
      context: .
      dockerfile: anila-core-router/Dockerfile
    expose:
      - "9000"
    environment:
      CSP_BASE_URL: http://csp:8000
      CSP_SERVICE_TOKEN: ${CSP_SERVICE_TOKEN:-dev-service-token}
      MODEL: ${LLM_MODEL:-gemma4}
    depends_on:
      csp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── pptx-renderer ───────────────────────────────────────────────────────
  pptx-renderer:
    build:
      context: ANILALM/pptx-skill
      dockerfile: Dockerfile
    expose:
      - "7100"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:7100/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ── ANILA LM (no-SSO 版本，從 feature/no-sso branch build) ───────────────
  anilalm:
    build:
      context: ANILALM
      args:
        BASE_PATH: ${ANILALM_BASE_PATH:-/anilalm/}
        VITE_DEFAULT_CHAT_MODEL: ${ANILALM_DEFAULT_CHAT_MODEL:-gemma4}
    expose:
      - "80"
    depends_on:
      csp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # ── ANILA UI (admin SPA) ────────────────────────────────────────────────
  anila-ui:
    build:
      context: ANILA_UI/anila-ui
      args:
        VITE_CSP_BASE_URL: ${ANILA_PUBLIC_CSP_BASE_URL-}
        VITE_ROUTER_BASE_URL: ${ANILA_PUBLIC_ROUTER_BASE_URL:-/router}
    expose:
      - "80"
    depends_on:
      csp:
        condition: service_healthy
      router:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # ── nginx (dev 入口，獨立 port + 獨立 container_name) ───────────────────
  nginx:
    image: nginx:alpine
    # ⚠️ 必須顯式不同名——compose 對 container_name 不會自動加 project prefix。
    container_name: anila-nginx-dev
    ports:
      - "${NGINX_HTTP_PORT_DEV:-8080}:80"
      - "${NGINX_HTTPS_PORT_DEV:-8443}:443"
      - "${ANILA_UI_HTTPS_PORT_DEV:-9443}:4443"
    volumes:
      - ./myCSPPlatform/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./myCSPPlatform/docker/certs:/etc/nginx/certs:ro
      - ./share-dev/static:/usr/share/nginx/share-files/static:ro
      - ./share-dev/uploads:/usr/share/nginx/share-files/uploads:rw
    depends_on:
      csp:
        condition: service_healthy
        restart: true
      anilalm:
        condition: service_healthy
        restart: true
      router:
        condition: service_healthy
        restart: true
      anila-ui:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  # ⚠️ 不同名才不會跟 live stack 的 anila-net 衝突。
  default:
    name: anila-dev-net
  # 跟 models stack + live stack 共用的 external network。
  # 第一次 up 時若不存在,bootstrap: docker network create anila-models-net
  anila-models-net:
    external: true
    name: anila-models-net

volumes:
  csp-pgdata-dev:
  redis-data-dev:
