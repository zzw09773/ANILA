# Example model-role configuration for a future multi-model AgenticRAG runtime.
# This file is a template, not a currently loaded runtime config.

main_model: "__MAIN_MODEL__"
advisor_model: "__ADVISOR_MODEL__"
worker_default_model: "__WORKER_DEFAULT_MODEL__"
embedding_model: "__EMBEDDING_MODEL__"

policies:
  require_advisor_for:
    - document_release
    - mission_assessment
    - architecture_change

  require_human_approval_for:
    - external_document_send
    - mission_publish
    - destructive_action

  max_parallel_workers: 4
  persist_agent_state: true
  persist_tool_traces: true
  persist_retrieval_traces: true

