services:
  # ── AgenticRAG API ───────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env          # 從 .env 載入所有設定
    environment:
      # 覆蓋 .env 中的 DATABASE_URL，指向 compose 內部的 db 服務
      DATABASE_URL: postgresql://anila:anila@db:5432/anila_rag
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/tmp/anila_uploads
      # Sprint 8 X / Phase D — persist the bootstrap-issued csk- token
      # across container restarts. Without this the entrypoint would
      # try to re-bootstrap on every restart and CSP would reject the
      # already-consumed bsk-.
      - anila-agent-state:/var/lib/anila-agent
    restart: unless-stopped

  # ── OpenAI-compatible RAG API（供 OpenWebUI 連接）───────────────────────────
  rag-api:
    build: .
    command: ["python3", "/app/api.py"]
    ports:
      - "24786:24786"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://anila:anila@db:5432/anila_rag
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api.py:/app/api.py:ro   # 掛載 api.py，修改後重啟即生效
      - anila-agent-state:/var/lib/anila-agent
    restart: unless-stopped

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: anila
      POSTGRES_PASSWORD: anila
      POSTGRES_DB: anila_rag
    ports:
      - "5432:5432"       # 本機也可直接連，方便除錯
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anila -d anila_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  anila-agent-state:
