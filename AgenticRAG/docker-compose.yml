# docker-compose.yml — RAG Sample Agent
#
# Two services:
#   rag-api  — OpenAI-compatible chat proxy + pgvector RAG injection (port 24786)
#   db       — PostgreSQL with pgvector extension
#
# The build context is the parent directory so the sibling `anila-core/`
# package is available. Invoke from the AgenticRAG/ directory:
#     docker compose up -d
#
# Copy `.env.example` → `.env` first and fill in your LLM / embedding endpoints.

services:
  rag-api:
    build:
      context: ..                     # parent D:/ANILA/ so anila-core is in scope
      dockerfile: AgenticRAG/Dockerfile
    ports:
      - "24786:24786"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://anila:anila@db:5432/anila_rag
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: anila
      POSTGRES_PASSWORD: anila
      POSTGRES_DB: anila_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anila -d anila_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
