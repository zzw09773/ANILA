<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ANILA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script>
  // ---- Tweak defaults (host may rewrite this block) ----
  window.ANILA_TWEAKS = /*EDITMODE-BEGIN*/{
    "accent": "#a05a2c",
    "dark": true,
    "density": 18,
    "sansFamily": "Noto Sans TC",
    "monoFamily": "ui-monospace",
    "agentSwitcherPosition": "bottom",
    "traceStyle": "collapsible"
  }/*EDITMODE-END*/;
</script>

<style>
  :root {
    --bg:            oklch(0.985 0.002 90);
    --bg-elev:       oklch(1 0 0);
    --bg-subtle:     oklch(0.965 0.003 90);
    --fg:            oklch(0.18 0.005 270);
    --fg-muted:      oklch(0.48 0.005 270);
    --fg-subtle:     oklch(0.62 0.005 270);
    --border:        oklch(0.91 0.004 270);
    --border-strong: oklch(0.85 0.005 270);
    --accent:        #0b7285;
    --accent-fg:     #ffffff;
    --accent-soft:   oklch(0.95 0.02 200);
    --danger:        oklch(0.55 0.18 25);
    --warn:          oklch(0.72 0.14 75);
    --success:       oklch(0.58 0.10 150);

    --radius-sm: 4px;
    --radius:    6px;
    --radius-lg: 10px;

    --font-sans: "Noto Sans TC", "Inter", system-ui, -apple-system, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

    --density: 16px;
  }

  [data-theme="dark"] {
    --bg:            oklch(0.16 0.004 270);
    --bg-elev:       oklch(0.20 0.004 270);
    --bg-subtle:     oklch(0.22 0.004 270);
    --fg:            oklch(0.96 0.003 90);
    --fg-muted:      oklch(0.72 0.005 270);
    --fg-subtle:     oklch(0.55 0.005 270);
    --border:        oklch(0.28 0.005 270);
    --border-strong: oklch(0.36 0.005 270);
    --accent-soft:   oklch(0.30 0.04 200);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root { height: 100%; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }
  ::selection { background: var(--accent-soft); color: var(--fg); }

  /* Scrollbar — slim */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 999px;
    border: 3px solid var(--bg);
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-subtle); }

  /* (list-density rules live below under .anila-msg-body so their
     specificity beats the .anila-msg-body p margin and they don't
     leak into other UI chrome like Settings panels.) */

  /* Claude.ai-style message chrome:
     - Assistant action toolbar is muted by default and fully revealed
       on hover / keyboard focus of the message, so the reading surface
       stays uncluttered.
     - On pointer-less devices (touch) we always reveal it. */
  .anila-msg-actions {
    opacity: 0;
    transition: opacity 140ms ease;
  }
  .anila-msg-assistant:hover .anila-msg-actions,
  .anila-msg-assistant:focus-within .anila-msg-actions {
    opacity: 1;
  }
  @media (hover: none) {
    .anila-msg-actions { opacity: 1; }
  }

  /* Prose rhythm inside assistant replies. Tightens paragraph stacking
     so a multi-paragraph answer reads as one flowing block, while
     keeping headings visually distinct. Matches OpenWebUI / ChatGPT
     compact density — margins inside lists collapse to near-zero so
     numbered items stay readable without airy gaps. */
  .anila-msg-body p { margin: 0 0 10px 0; }
  .anila-msg-body p:last-child { margin-bottom: 0; }

  /* Content headings are LLM-emitted section titles (e.g. "問題答案").
     Keep them readable but restrained so they don't compete with the
     actual H1 of the page. */
  .anila-msg-body h1 { font-size: 17px; font-weight: 600; margin: 16px 0 6px; }
  .anila-msg-body h2 { font-size: 15px; font-weight: 600; margin: 14px 0 5px; }
  .anila-msg-body h3 { font-size: 14px; font-weight: 600; margin: 12px 0 4px; }
  .anila-msg-body h1:first-child,
  .anila-msg-body h2:first-child,
  .anila-msg-body h3:first-child { margin-top: 0; }

  /* Lists: dense like OpenWebUI. Key fix: override .anila-msg-body p
     margin inside <li> — otherwise every loose-list item gains 10px
     trailing space and numbered answers visibly "air out". */
  .anila-msg-body ul,
  .anila-msg-body ol { margin: 6px 0; padding-left: 22px; }
  .anila-msg-body li { margin: 2px 0; }
  .anila-msg-body li > p { margin: 0 0 2px 0; }
  .anila-msg-body li > ul,
  .anila-msg-body li > ol { margin: 2px 0; }
  .anila-msg-body li > *:last-child { margin-bottom: 0; }

  .anila-msg-body pre {
    border-radius: 10px;
    padding: 12px 14px;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
  }
  .anila-msg-body code {
    font-family: var(--font-mono);
    font-size: 0.92em;
  }
  .anila-msg-body blockquote {
    margin: 10px 0;
    padding: 4px 12px;
    border-left: 3px solid var(--border-strong, var(--border));
    color: var(--fg-muted);
  }

  /* Reasoning summary — Claude.ai-style ghost row. Hover gives it a
     subtle hit target; the disclosure body uses only a left border
     (no background box) so it doesn't feel like another card. */
  .anila-reasoning-toggle:hover {
    background: var(--bg-subtle);
    color: var(--fg-muted);
  }
  .anila-reasoning-spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    border-top-color: var(--fg-muted);
    animation: anila-reasoning-spin 0.7s linear infinite;
  }
  @keyframes anila-reasoning-spin {
    to { transform: rotate(360deg); }
  }

  @keyframes anila-blink { 50% { opacity: 0; } }

  .boot-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; color: var(--fg-muted);
    font-family: var(--font-mono); font-size: 13px;
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
