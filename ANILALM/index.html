<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANILA LM</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        /* System fonts only — the platform's outer nginx ships a strict
           CSP (`style-src 'self' 'unsafe-inline'; font-src 'self' data:`),
           which intentionally forbids external CDNs. Latin text uses the
           system UI stack; Traditional Chinese falls through to whatever
           CJK font the OS ships (PingFang TC on macOS, Microsoft JhengHei
           on Windows, Noto Sans CJK TC on Linux). */
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei',
          'PingFang TC', 'Noto Sans CJK TC', system-ui, sans-serif;
        background: #0b0d10;
        color: #e8eaed;
        transition: background 220ms ease, color 220ms ease;
      }
      body.light {
        background: #fafaf7;
        color: #1a1a1a;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      button,
      input,
      textarea {
        font-family: inherit;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: none; }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px) scale(0.98); }
        to { opacity: 1; transform: none; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(128, 128, 128, 0.25);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(128, 128, 128, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
