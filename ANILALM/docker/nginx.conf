# Internal nginx for the ANILALM container. The outer ANILA reverse proxy
# fronts this on /anilalm/ — so traffic arrives already prefixed.
#
# Strategy:
#   - assets/index.html were built by Vite with base='/anilalm/', so
#     `<script src="/anilalm/assets/...">` is what the browser asks for.
#   - We serve those via `alias` so the on-disk path stays at the standard
#     /usr/share/nginx/html — no mirroring under html/anilalm/ needed.
#   - SPA fallback uses a *prefixed* try_files target (`/anilalm/index.html`)
#     so the alias resolves and React Router's basename matches the URL.

server {
    listen 80;
    server_name _;

    # Health endpoint — outer compose healthcheck calls this; intentionally
    # at root (no /anilalm prefix) because the in-container probe runs
    # against 127.0.0.1 directly.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # SPA mount under the subpath. `alias` maps the URL prefix onto the
    # nginx html dir; try_files cascades to /anilalm/index.html so
    # client-side routes (e.g. /anilalm/c/47) resolve.
    location /anilalm/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /anilalm/index.html;

        # Built assets ship with hashed filenames — long-cache them.
        location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }

    # Bare /anilalm (no trailing slash) needs to redirect with the
    # slash so relative refs in index.html keep working.
    location = /anilalm {
        return 301 $scheme://$http_host/anilalm/;
    }

    # If something hits the container at / directly (i.e. bypass the outer
    # proxy and the prefix), nudge them to the proper path so debugging
    # doesn't end with a confusing 404.
    location = / {
        return 301 /anilalm/;
    }
}
