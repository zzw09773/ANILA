services:
  # ============================================================
  # Nginx 反向代理（唯一對外入口）
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: csp-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      csp:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - csp_network

  # ============================================================
  # PostgreSQL 資料庫
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: csp-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER:-csp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-csp_password}
      POSTGRES_DB: ${DB_NAME:-csp}
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-csp} -d ${DB_NAME:-csp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - csp_network

  # ============================================================
  # CSP Platform - 管理平台
  # ============================================================
  csp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: csp-backend
    expose:
      - "8000"
    volumes:
      - ../logs:/app/logs
      # 舊版 SQLite 資料庫（唯讀掛載），啟動時會一次性遷移到 PostgreSQL
      # 若為全新部署可移除此行
      - ../data:/app/legacy-data:ro
    env_file:
      - ../.env
    environment:
      TZ: Asia/Taipei
      LEGACY_SQLITE_PATH: /app/legacy-data/csp.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - csp_network

