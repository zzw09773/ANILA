# ============================================================
# CSP Platform - Nginx 反向代理（生產級配置）
# ============================================================

# ── DNS resolver — Docker's embedded DNS at 127.0.0.11 ──
# Without this, `proxy_pass http://<service>:<port>` resolves DNS once at
# config-load time and pins to that IP. When a service is recreated
# (e.g. `docker compose up -d codeserver`) it gets a new IP on anila-net
# and nginx keeps proxying to the dead old IP → 502 until nginx restart.
# Combined with VARIABLE proxy_pass below (set $upstream … then proxy_pass
# http://$upstream), this makes nginx re-resolve at every request.
# valid=30s — Docker's DNS TTL is short anyway; longer cache hides outages
# without a meaningful performance win.
resolver 127.0.0.11 valid=30s ipv6=off;

# ── Rate Limiting Zones ──
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
# card_verify_limit:PKCS#7 解析是 CPU-重操作 (cryptography + DER parse + cert
# 抽 claim),用窄頻寬擋 DoS。真實使用情境一人刷卡頻率 < 1r/min,2r/s + burst 3
# 對使用者沒摩擦,只擋自動化攻擊。
limit_req_zone $binary_remote_addr zone=card_verify_limit:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Upstreams ──
upstream csp_backend {
    server csp:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream router_backend {
    server router:9000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream anila_ui_static {
    server anila-ui:80 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ── WebSocket upgrade map ──
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Host header allowlist ──
# 拒絕未知 Host header,防止內網有人帶任意 Host 探測或欺騙 backend 的
# Host-based 邏輯。dev (localhost/127.0.0.1) 與 prod (10.53.100.12) 都涵蓋;
# FQDN 用 *.ncsist.org.tw wildcard — IT 之後若給 FQDN 不必再改 nginx.conf。
# `return 444` 直接關連線(無 error page,不洩漏服務 existence)。
# 換新 prod IP 時:把這條 map 內的 10.53.100.12 改掉,重啟 nginx。
map $host $is_anila_host {
    default 0;
    "localhost" 1;
    "127.0.0.1" 1;
    "10.53.100.12" 1;
    ~^.+\.ncsist\.org\.tw$ 1;
}

# ── HTTP Server（port 80）→ 強制跳轉 HTTPS ──
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS Server（port 443）──
server {
    listen 443 ssl default_server;
    server_name _;

    # Host header allowlist (見檔頂 map $is_anila_host)。未知 Host → 444。
    # `if` 在 server-block (非 location 內) 接 `return` 是官方建議用法,
    # 「if is evil」warning 不適用於這個 pattern。
    if ($is_anila_host = 0) { return 444; }

    # ── SSL 憑證 ──
    # 自簽憑證（開發用）；有正式 domain 後替換這兩行即可：
    #   ssl_certificate     /etc/nginx/certs/server.crt;
    #   ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — 預設啟用（max-age=180 天）。自簽憑證的本機環境若想關閉，
    # 啟動時設 NGINX_HSTS_ENABLED=0；正式環境保留 always 即可。瀏覽器
    # 一旦記住 HSTS 就會強制使用 HTTPS，務必在簽到正式憑證後再讓使用者
    # 大量造訪，否則自簽憑證鎖死後無法降回 http://。
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    client_max_body_size 100M;

    # ── 安全標頭 ──
    server_tokens off;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # Baseline CSP — 只允許 same-origin 資源；SPA build 不依賴外部 CDN。
    # 正式環境若需嵌入 GitLab / n8n iframe 可再加 frame-src 白名單。
    # CSP 已收掉 'unsafe-eval' (Vue/React prod build 模板都 pre-compile,不需要動態
    # 程式碼執行)。'unsafe-inline' 暫保留以避免破壞 Vite legacy script bootstrap;
    # 改 nonce-based CSP 留下個 sprint 處理。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    # 嚴格 Permissions-Policy — 平台不需要這些 sensor / 媒體 API。
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # ── Gzip 壓縮 ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # ─────────────────────────────────────────────
    # Health Check（不限速、不記 log）
    # ─────────────────────────────────────────────
    location /health {
        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        access_log off;
    }

    # ─────────────────────────────────────────────
    # 卡片簽章驗證 — 用窄 rate limit 擋 PKCS#7 parse DoS。
    # exact-match location 會先於下方 /api/auth/ 匹配,即使 URI 在 prefix 範圍。
    # ─────────────────────────────────────────────
    location = /api/auth/card/verify {
        limit_req zone=card_verify_limit burst=3 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout    60s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
    }

    # ─────────────────────────────────────────────
    # 認證端點（較嚴格的 rate limit）
    # ─────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout    60s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
    }

    # ─────────────────────────────────────────────
    # OpenAI 相容代理端點（streaming 支援）
    # /v1/chat/completions, /v1/embeddings, /v2/embeddings
    # ─────────────────────────────────────────────
    location ~ ^/v[12]/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Streaming: 關閉 buffering
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # LLM 長文生成需要較長 timeout
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    300s;

        # 大型 audio/embedding 請求
        client_body_buffer_size 10M;
    }

    # ─────────────────────────────────────────────
    # Studio pipeline — slides/report 端點需要 60-180s（檢索 → LLM →
    # 渲染 → 視覺 QA，遇 critical 缺陷會多一輪 fix-and-rerender）。
    # 必須比 /api/ 通則更寬鬆。回應是 .pptx binary，關閉 buffering
    # 直接串流給前端。nginx prefix location 是「最長 match wins」，
    # 寫在 /api/ 之前只是為了直覺，與 /api/ 的相對順序不影響行為。
    # ─────────────────────────────────────────────
    location /api/studio/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Body streaming: .pptx is binary, no buffering / caching desired.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # Response header buffer must be large enough for the Studio extras —
        # X-Slides-Title (CJK percent-encoded) + X-Slides-QA-Defects
        # (percent-encoded JSON for up to 30 slides × per-slide summaries,
        # 3× expansion from CJK escaping). Default 4k/8k overflows when
        # vision QA finds multiple defects → "upstream sent too big header"
        # → 502. 32k gives plenty of headroom for Phase 3 metadata too.
        # Note: proxy_busy_buffers_size MUST be < total of proxy_buffers
        # (count × size). 8 × 32k = 256k, busy ≤ 64k satisfies the constraint
        # AND the rule that busy_buffers cannot equal the total.
        proxy_buffer_size       32k;
        proxy_buffers         8 32k;
        proxy_busy_buffers_size 64k;

        proxy_read_timeout    300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
    }

    # ─────────────────────────────────────────────
    # API 端點（一般限速）
    # /api/keys, /api/models, /api/usage, /api/users, ...
    # ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout    120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
    }

    # ─────────────────────────────────────────────
    # ─────────────────────────────────────────────
    # code-server subpath — adopted verbatim from My-OpenAI-Frontend prod
    # nginx.prod.conf where the same setup ran in production. Differences
    # from our earlier (broken) attempt:
    #   - upstream codercom/code-server image (not lscr.io/linuxserver fork)
    #   - location WITHOUT trailing slash + explicit `rewrite ... break;`
    #     (rather than proxy_pass trailing slash for prefix strip)
    #   - minimal headers — only Host, Upgrade, Connection. No X-Forwarded-*
    #     hints; code-server upstream infers what it needs from Host alone.
    #   - Connection 'Upgrade' as a literal string, not the $connection_upgrade
    #     map. code-server tolerates Upgrade on non-WS requests.
    # The redirect on `= /codeserver` keeps trailing-slash discipline so
    # relative asset URLs in code-server's HTML resolve correctly.
    # ─────────────────────────────────────────────
    location = /codeserver {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /codeserver {
        # Prod initial mode: cold-storage service, route gated 404 until
        # SSO 整合完成 + IT 確認可開放。`return 404` 在 ngx_http_rewrite_module
        # 階段就 short-circuit,proxy_pass 之類後續 directive 不會執行 (寫在
        # 下方的舊 config 保留以便日後解凍 — 拿掉這條 return 即可恢復)。
        return 404;

        # ── 解凍時還原以下原 config ──
        # `set` MUST come before `rewrite ... break` — both directives are
        # in the ngx_http_rewrite_module and `break` halts the module's
        # processing, so any `set` after it never runs and the variable
        # stays uninitialized → "invalid URL prefix" 500. Variable
        # proxy_pass forces nginx to re-resolve via the resolver directive
        # on every request, picking up new container IPs after a
        # `docker compose up -d codeserver` without an nginx restart.
        set $codeserver_addr "codeserver:8080";
        rewrite ^/codeserver/(.*)$ /$1 break;
        proxy_pass http://$codeserver_addr;
        proxy_redirect off;
        proxy_set_header Host       $http_host;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'Upgrade';

        client_max_body_size 200M;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─────────────────────────────────────────────
    # n8n — subpath /n8n (N8N_PATH=/n8n/ on the container side handles the
    # rewrite UI-side; we still strip the prefix in nginx so the upstream
    # request path matches what n8n expects internally).
    # Trust-the-headers set borrowed from My-OpenAI-Frontend prod.
    # ─────────────────────────────────────────────
    location = /n8n {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /n8n {
        # Prod initial mode: cold-storage service, route gated 404。解凍同 /codeserver。
        return 404;

        # ── 解凍時還原以下原 config ──
        # set BEFORE rewrite — see /codeserver block for why.
        set $n8n_addr "n8n:5678";
        rewrite ^/n8n/(.*)$ /$1 break;
        proxy_pass http://$n8n_addr;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Host                $http_host;
        proxy_set_header X-Forwarded-Host    $host;
        proxy_set_header X-Forwarded-Server  $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;
        proxy_set_header X-Url-Scheme        $scheme;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          $connection_upgrade;
        proxy_read_timeout 120s;
    }

    # ─────────────────────────────────────────────
    # ANILA LM SPA — subpath /anilalm
    # Vite was built with base='/anilalm/' so the request URI INCLUDES
    # the prefix when it lands on the anilalm container; the in-container
    # nginx then `alias`-maps /anilalm/* onto its html dir. Don't strip
    # the prefix here.
    # The bare /anilalm (no slash) redirects to keep relative refs
    # working — same trick as /codeserver / /n8n / /gitlab.
    # ─────────────────────────────────────────────
    location = /anilalm {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /anilalm {
        set $anilalm_addr "anilalm:80";
        proxy_pass http://$anilalm_addr;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ─────────────────────────────────────────────
    # /static + /uploads — shared workflow assets (see share/README.md).
    # /static is read-only (templates, icons referenced by n8n workflows),
    # /uploads is read-write (user uploads, embedding sources).
    # try_files $uri =404 — don't fall back to the SPA when an asset is missing.
    # ─────────────────────────────────────────────
    location /static/ {
        alias /usr/share/nginx/share-files/static/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /uploads/ {
        alias /usr/share/nginx/share-files/uploads/;
        try_files $uri =404;
        # Uploads change; don't cache aggressively.
        expires 1h;
    }

    # ─────────────────────────────────────────────
    # GitLab same-origin path (Phase 1 Step 8) — see port 4443 block.
    # ─────────────────────────────────────────────
    location /gitlab/ {
        # Prod initial mode: cold-storage service, route gated 404。解凍同 /codeserver。
        return 404;

        # ── 解凍時還原以下原 config ──
        set $gitlab_addr "gitlab:8181";
        proxy_pass http://$gitlab_addr;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Ssl   on;

        client_max_body_size 5G;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # 前端 SPA + 其他路由（fallback to CSP backend）
    # ─────────────────────────────────────────────
    location / {
        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout 60s;
    }

    # ─────────────────────────────────────────────
    # 隱藏檔案拒絕存取
    # ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ── HTTPS Server（port 4443）─ ANILA UI 入口 ──────────────────────
# Same-origin proxy for ANILA UI (React): serves static files and
# proxies /api/, /v1/, /v2/ to csp_backend and /router/ to router_backend
# (prefix stripped). ANILA UI is built with empty VITE_CSP_BASE_URL and
# VITE_ROUTER_BASE_URL=/router so every call becomes same-origin.
server {
    listen 4443 ssl;
    http2 on;
    server_name _;

    # Host header allowlist (同 port 443)。
    if ($is_anila_host = 0) { return 444; }

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache   shared:SSL_ANILA:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 100M;

    server_tokens off;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # CSP 已收掉 'unsafe-eval' (Vue/React prod build 模板都 pre-compile,不需要動態
    # 程式碼執行)。'unsafe-inline' 暫保留以避免破壞 Vite legacy script bootstrap;
    # 改 nonce-based CSP 留下個 sprint 處理。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Card PKCS#7 verify — narrow rate limit to guard CPU-heavy crypto parse.
    # Exact-match location wins over /api/auth/ prefix for this specific URI.
    location = /api/auth/card/verify {
        limit_req zone=card_verify_limit burst=3 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # Auth endpoints (stricter rate limit)
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # Studio pipeline — see commentary in port 443 block. 60-180s, binary stream.
    location /api/studio/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Body streaming: .pptx is binary, no buffering / caching desired.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # Response header buffer must be large enough for the Studio extras —
        # X-Slides-Title (CJK percent-encoded) + X-Slides-QA-Defects
        # (percent-encoded JSON for up to 30 slides × per-slide summaries,
        # 3× expansion from CJK escaping). Default 4k/8k overflows when
        # vision QA finds multiple defects → "upstream sent too big header"
        # → 502. 32k gives plenty of headroom for Phase 3 metadata too.
        # Note: proxy_busy_buffers_size MUST be < total of proxy_buffers
        # (count × size). 8 × 32k = 256k, busy ≤ 64k satisfies the constraint
        # AND the rule that busy_buffers cannot equal the total.
        proxy_buffer_size       32k;
        proxy_buffers         8 32k;
        proxy_busy_buffers_size 64k;

        proxy_read_timeout    300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
    }

    # General CSP API
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # CSP OpenAI-compat data plane (/v1/chat/completions, /v1/embeddings, /v2/embeddings)
    location ~ ^/v[12]/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        client_body_buffer_size 10M;
    }

    # ANILA Router (/router/* → router:9000/*)  — prefix stripped by trailing slash
    location /router/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://router_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ─────────────────────────────────────────────
    # ─────────────────────────────────────────────
    # code-server subpath — see commentary in the port 443 block for the
    # rewrite-vs-trailing-slash decision and the My-OpenAI-Frontend lineage.
    # ─────────────────────────────────────────────
    location = /codeserver {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /codeserver {
        # Prod initial mode: cold-storage service, route gated 404。解凍同 port 443 區塊。
        return 404;

        # ── 解凍時還原以下原 config ──
        # `set` MUST come before `rewrite ... break` — both directives are
        # in the ngx_http_rewrite_module and `break` halts the module's
        # processing, so any `set` after it never runs and the variable
        # stays uninitialized → "invalid URL prefix" 500. Variable
        # proxy_pass forces nginx to re-resolve via the resolver directive
        # on every request, picking up new container IPs after a
        # `docker compose up -d codeserver` without an nginx restart.
        set $codeserver_addr "codeserver:8080";
        rewrite ^/codeserver/(.*)$ /$1 break;
        proxy_pass http://$codeserver_addr;
        proxy_redirect off;
        proxy_set_header Host       $http_host;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'Upgrade';

        client_max_body_size 200M;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─────────────────────────────────────────────
    # n8n — subpath /n8n (N8N_PATH=/n8n/ on the container side handles the
    # rewrite UI-side; we still strip the prefix in nginx so the upstream
    # request path matches what n8n expects internally).
    # Trust-the-headers set borrowed from My-OpenAI-Frontend prod.
    # ─────────────────────────────────────────────
    location = /n8n {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /n8n {
        # Prod initial mode: cold-storage service, route gated 404。解凍同 port 443 區塊。
        return 404;

        # ── 解凍時還原以下原 config ──
        # set BEFORE rewrite — see /codeserver block for why.
        set $n8n_addr "n8n:5678";
        rewrite ^/n8n/(.*)$ /$1 break;
        proxy_pass http://$n8n_addr;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Host                $http_host;
        proxy_set_header X-Forwarded-Host    $host;
        proxy_set_header X-Forwarded-Server  $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;
        proxy_set_header X-Url-Scheme        $scheme;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          $connection_upgrade;
        proxy_read_timeout 120s;
    }

    # ─────────────────────────────────────────────
    # ANILA LM — same configuration as the port-443 block.
    # ─────────────────────────────────────────────
    location = /anilalm {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /anilalm {
        set $anilalm_addr "anilalm:80";
        proxy_pass http://$anilalm_addr;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ─────────────────────────────────────────────
    # /static + /uploads — shared workflow assets (see share/README.md).
    # /static is read-only (templates, icons referenced by n8n workflows),
    # /uploads is read-write (user uploads, embedding sources).
    # try_files $uri =404 — don't fall back to the SPA when an asset is missing.
    # ─────────────────────────────────────────────
    location /static/ {
        alias /usr/share/nginx/share-files/static/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /uploads/ {
        alias /usr/share/nginx/share-files/uploads/;
        try_files $uri =404;
        # Uploads change; don't cache aggressively.
        expires 1h;
    }

    # ─────────────────────────────────────────────
    # GitLab same-origin path (Phase 1 Step 8)
    # GitLab Omnibus's external_url='https://.../gitlab' makes it aware of
    # the prefix, so we DO NOT strip /gitlab here — proxy_pass without a
    # trailing path forwards the URI as-is to Workhorse on 8181.
    # ─────────────────────────────────────────────
    location /gitlab/ {
        # Prod initial mode: cold-storage service, route gated 404。解凍同 port 443 區塊。
        return 404;

        # ── 解凍時還原以下原 config ──
        set $gitlab_addr "gitlab:8181";
        proxy_pass http://$gitlab_addr;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # $http_host preserves port (e.g. localhost:4443); $host strips it,
        # which makes GitLab redirect to https://localhost/... and lose the
        # path back to ANILA's reverse proxy. Same fix needs apply if other
        # subpath services (e.g. n8n) end up here.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Ssl   on;

        # Git LFS / large repo push can hit GB scale.
        client_max_body_size 5G;
        proxy_request_buffering off;

        # CI build logs run for tens of minutes; tail must flush in real time.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # branch SSO: 4443 port 是 anila-ui dedicated entry，但 /login 必須在
    # myCSPPlatform Vue SPA (在 443 port 由 csp_backend serve)。直接 proxy
    # 到 csp_backend 會引發 /assets/ 衝突 (Vue 跟 anila-ui 都用 /assets/，
    # nginx 無法依 hash 區分)，所以改用 302 跨 port redirect 到 443。
    # LoginView 的 ?next=... 會帶 absolute URL with 4443 port，登入完跳回。
    location = /login {
        return 302 https://$host/login$is_args$args;
    }

    # ANILA UI static (React SPA served by anila-ui container's nginx)
    location / {
        proxy_pass http://anila_ui_static;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# NOTE: codeserver dedicated port :8443 server block was removed. We're
# now back on /codeserver subpath using the upstream codercom/code-server
# image and the proven rewrite-based proxy_pass pattern from
# My-OpenAI-Frontend prod (see /codeserver location in the 4443 block).
