# ============================================================
# CSP Platform - Nginx 反向代理（生產級配置）
# ============================================================

# ── Rate Limiting Zones ──
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Upstream ──
upstream csp_backend {
    server csp:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── WebSocket upgrade map ──
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP Server（port 80）→ 強制跳轉 HTTPS ──
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS Server（port 443）──
server {
    listen 443 ssl default_server;
    server_name _;

    # ── SSL 憑證 ──
    # 自簽憑證（開發用）；有正式 domain 後替換這兩行即可：
    #   ssl_certificate     /etc/nginx/certs/server.crt;
    #   ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（有正式憑證後再啟用，自簽憑證不建議開）
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 100M;

    # ── 安全標頭 ──
    server_tokens off;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # ── Gzip 壓縮 ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # ─────────────────────────────────────────────
    # Health Check（不限速、不記 log）
    # ─────────────────────────────────────────────
    location /health {
        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        access_log off;
    }

    # ─────────────────────────────────────────────
    # 認證端點（較嚴格的 rate limit）
    # ─────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout    60s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
    }

    # ─────────────────────────────────────────────
    # OpenAI 相容代理端點（streaming 支援）
    # /v1/chat/completions, /v1/embeddings, /v2/embeddings
    # ─────────────────────────────────────────────
    location ~ ^/v[12]/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Streaming: 關閉 buffering
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # LLM 長文生成需要較長 timeout
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    300s;

        # 大型 audio/embedding 請求
        client_body_buffer_size 10M;
    }

    # ─────────────────────────────────────────────
    # API 端點（一般限速）
    # /api/keys, /api/models, /api/usage, /api/users, ...
    # ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout    120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
    }

    # ─────────────────────────────────────────────
    # 前端 SPA + 其他路由（fallback to CSP backend）
    # ─────────────────────────────────────────────
    location / {
        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout 60s;
    }

    # ─────────────────────────────────────────────
    # 隱藏檔案拒絕存取
    # ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
