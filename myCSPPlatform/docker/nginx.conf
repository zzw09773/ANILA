# ============================================================
# CSP Platform - Nginx 反向代理（生產級配置）
# ============================================================

# ── Rate Limiting Zones ──
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Upstreams ──
upstream csp_backend {
    server csp:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream router_backend {
    server router:9000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream anila_ui_static {
    server anila-ui:80 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ── WebSocket upgrade map ──
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP Server（port 80）→ 強制跳轉 HTTPS ──
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS Server（port 443）──
server {
    listen 443 ssl default_server;
    server_name _;

    # ── SSL 憑證 ──
    # 自簽憑證（開發用）；有正式 domain 後替換這兩行即可：
    #   ssl_certificate     /etc/nginx/certs/server.crt;
    #   ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（有正式憑證後再啟用，自簽憑證不建議開）
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 100M;

    # ── 安全標頭 ──
    server_tokens off;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # ── Gzip 壓縮 ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # ─────────────────────────────────────────────
    # Health Check（不限速、不記 log）
    # ─────────────────────────────────────────────
    location /health {
        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        access_log off;
    }

    # ─────────────────────────────────────────────
    # 認證端點（較嚴格的 rate limit）
    # ─────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout    60s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
    }

    # ─────────────────────────────────────────────
    # OpenAI 相容代理端點（streaming 支援）
    # /v1/chat/completions, /v1/embeddings, /v2/embeddings
    # ─────────────────────────────────────────────
    location ~ ^/v[12]/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Streaming: 關閉 buffering
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # LLM 長文生成需要較長 timeout
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    300s;

        # 大型 audio/embedding 請求
        client_body_buffer_size 10M;
    }

    # ─────────────────────────────────────────────
    # API 端點（一般限速）
    # /api/keys, /api/models, /api/usage, /api/users, ...
    # ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout    120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
    }

    # ─────────────────────────────────────────────
    # ─────────────────────────────────────────────
    # code-server subpath — adopted verbatim from My-OpenAI-Frontend prod
    # nginx.prod.conf where the same setup ran in production. Differences
    # from our earlier (broken) attempt:
    #   - upstream codercom/code-server image (not lscr.io/linuxserver fork)
    #   - location WITHOUT trailing slash + explicit `rewrite ... break;`
    #     (rather than proxy_pass trailing slash for prefix strip)
    #   - minimal headers — only Host, Upgrade, Connection. No X-Forwarded-*
    #     hints; code-server upstream infers what it needs from Host alone.
    #   - Connection 'Upgrade' as a literal string, not the $connection_upgrade
    #     map. code-server tolerates Upgrade on non-WS requests.
    # The redirect on `= /codeserver` keeps trailing-slash discipline so
    # relative asset URLs in code-server's HTML resolve correctly.
    # ─────────────────────────────────────────────
    location = /codeserver {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /codeserver {
        rewrite ^/codeserver/(.*)$ /$1 break;
        proxy_pass http://codeserver:8080/;
        proxy_redirect off;
        proxy_set_header Host       $http_host;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'Upgrade';

        client_max_body_size 200M;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─────────────────────────────────────────────
    # n8n — subpath /n8n (N8N_PATH=/n8n/ on the container side handles the
    # rewrite UI-side; we still strip the prefix in nginx so the upstream
    # request path matches what n8n expects internally).
    # Trust-the-headers set borrowed from My-OpenAI-Frontend prod.
    # ─────────────────────────────────────────────
    location = /n8n {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /n8n {
        rewrite ^/n8n/(.*)$ /$1 break;
        proxy_pass http://n8n:5678/;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Host                $http_host;
        proxy_set_header X-Forwarded-Host    $host;
        proxy_set_header X-Forwarded-Server  $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;
        proxy_set_header X-Url-Scheme        $scheme;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          $connection_upgrade;
        proxy_read_timeout 120s;
    }

    # ─────────────────────────────────────────────
    # GitLab same-origin path (Phase 1 Step 8) — see port 4443 block.
    # ─────────────────────────────────────────────
    location /gitlab/ {
        proxy_pass http://gitlab:8181;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Ssl   on;

        client_max_body_size 5G;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # 前端 SPA + 其他路由（fallback to CSP backend）
    # ─────────────────────────────────────────────
    location / {
        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout 60s;
    }

    # ─────────────────────────────────────────────
    # 隱藏檔案拒絕存取
    # ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ── HTTPS Server（port 4443）─ ANILA UI 入口 ──────────────────────
# Same-origin proxy for ANILA UI (React): serves static files and
# proxies /api/, /v1/, /v2/ to csp_backend and /router/ to router_backend
# (prefix stripped). ANILA UI is built with empty VITE_CSP_BASE_URL and
# VITE_ROUTER_BASE_URL=/router so every call becomes same-origin.
server {
    listen 4443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache   shared:SSL_ANILA:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 100M;

    server_tokens off;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Auth endpoints (stricter rate limit)
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # General CSP API
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # CSP OpenAI-compat data plane (/v1/chat/completions, /v1/embeddings, /v2/embeddings)
    location ~ ^/v[12]/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://csp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        client_body_buffer_size 10M;
    }

    # ANILA Router (/router/* → router:9000/*)  — prefix stripped by trailing slash
    location /router/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;

        proxy_pass http://router_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ─────────────────────────────────────────────
    # ─────────────────────────────────────────────
    # code-server subpath — see commentary in the port 443 block for the
    # rewrite-vs-trailing-slash decision and the My-OpenAI-Frontend lineage.
    # ─────────────────────────────────────────────
    location = /codeserver {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /codeserver {
        rewrite ^/codeserver/(.*)$ /$1 break;
        proxy_pass http://codeserver:8080/;
        proxy_redirect off;
        proxy_set_header Host       $http_host;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'Upgrade';

        client_max_body_size 200M;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─────────────────────────────────────────────
    # n8n — subpath /n8n (N8N_PATH=/n8n/ on the container side handles the
    # rewrite UI-side; we still strip the prefix in nginx so the upstream
    # request path matches what n8n expects internally).
    # Trust-the-headers set borrowed from My-OpenAI-Frontend prod.
    # ─────────────────────────────────────────────
    location = /n8n {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /n8n {
        rewrite ^/n8n/(.*)$ /$1 break;
        proxy_pass http://n8n:5678/;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Host                $http_host;
        proxy_set_header X-Forwarded-Host    $host;
        proxy_set_header X-Forwarded-Server  $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;
        proxy_set_header X-Url-Scheme        $scheme;
        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          $connection_upgrade;
        proxy_read_timeout 120s;
    }

    # ─────────────────────────────────────────────
    # GitLab same-origin path (Phase 1 Step 8)
    # GitLab Omnibus's external_url='https://.../gitlab' makes it aware of
    # the prefix, so we DO NOT strip /gitlab here — proxy_pass without a
    # trailing path forwards the URI as-is to Workhorse on 8181.
    # ─────────────────────────────────────────────
    location /gitlab/ {
        proxy_pass http://gitlab:8181;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # $http_host preserves port (e.g. localhost:4443); $host strips it,
        # which makes GitLab redirect to https://localhost/... and lose the
        # path back to ANILA's reverse proxy. Same fix needs apply if other
        # subpath services (e.g. n8n) end up here.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Ssl   on;

        # Git LFS / large repo push can hit GB scale.
        client_max_body_size 5G;
        proxy_request_buffering off;

        # CI build logs run for tens of minutes; tail must flush in real time.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ANILA UI static (React SPA served by anila-ui container's nginx)
    location / {
        proxy_pass http://anila_ui_static;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# NOTE: codeserver dedicated port :8443 server block was removed. We're
# now back on /codeserver subpath using the upstream codercom/code-server
# image and the proven rewrite-based proxy_pass pattern from
# My-OpenAI-Frontend prod (see /codeserver location in the 4443 block).
