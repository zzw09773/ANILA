<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANILA · CSP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Resolve the user's chosen theme synchronously before Vue mounts so the
      first paint is already correct (no light → dark flash on a stored 'light').
    -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('anila.theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (_) {
          // localStorage may be blocked — fall back to default attribute on <html>.
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
