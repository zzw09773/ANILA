# ANILA Platform — integration stack.
#   docker-compose up -d
# 模型推論 service 在 models/docker-compose.yml (project: anila-models),
# 透過共用 external network ``anila-models-net`` 跨 project DNS。
#
# Prod initial mode 切換 (branch SSO):
#   - 所有 secret env var 預設改成 ``${VAR:?must be set}``,缺 .env 直接 fail。
#   - ANILA_ALLOW_DEV_SECRET 預設 0,任何 dev 預設值會被 startup_security 擋下。
#   - codeserver / n8n / gitlab service 仍定義但 nginx route 改 deny,等手動解凍。
# Dev 切換回去:把 .env 還原成 .env.dev.local 內容即可,所有 dev opt-in flag
# 都被 .env 那邊重新賦值,compose 不再提供「dev 預設值」這個安全網。

name: anila-platform

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  csp-db:
    # pgvector 是 postgres:16 的 superset,migration 0014 (ingestion) 需要
    # vector extension。換回 upstream postgres 會破 ingestion stack。
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: csp
      POSTGRES_PASSWORD: csp
      POSTGRES_DB: csp
    # 只開 loopback,host 上的 integration test 拿得到,LAN 摸不到。
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - csp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csp -d csp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── CSP (Control + Data Plane :8000) ────────────────────────────────────
  csp:
    build:
      context: .
      dockerfile: myCSPPlatform/docker/Dockerfile
    # 不對 host 開 port — 外部入口只有 nginx :443 (HTTPS + API key)。
    # 容器內 service-to-service 用 ``http://csp:8000`` 走 docker DNS。
    expose:
      - "8000"
    environment:
      PYTHONUNBUFFERED: "1"
      # 兩條 DB URL 拆開:csp_app 是 RLS-enforced 的 runtime role,
      # csp 是只給 migration 用的 superuser。混用會讓 document_chunks
      # 的 RLS 失效 (superuser 自動 bypass)。
      DATABASE_URL: postgresql://csp_app:csp@csp-db:5432/csp
      MIGRATION_DATABASE_URL: postgresql://csp:csp@csp-db:5432/csp
      SECRET_KEY: ${CSP_SECRET_KEY:?CSP_SECRET_KEY must be set (32+ bytes hex)}
      # startup_security 對 dev 預設值的拒絕開關。Prod 必須是 0 / unset。
      # 預設改成 0 (不再 fallback 1) — 缺 .env 時直接 enforce prod 模式。
      ANILA_ALLOW_DEV_SECRET: "${ANILA_ALLOW_DEV_SECRET:-0}"
      # url_guard 兩個 SSRF opt-in。loopback / link-local / cloud
      # metadata / docker service name 永遠擋,不受 flag 影響。Prod 不要 set。
      ANILA_ALLOW_HTTP_ENDPOINT: "${ANILA_ALLOW_HTTP_ENDPOINT:-0}"
      ANILA_ALLOW_PRIVATE_ENDPOINT: "${ANILA_ALLOW_PRIVATE_ENDPOINT:-0}"
      # SSRF allow-list — single-label docker service names 預設被擋,
      # 列進這條才能註冊。新增模型 service 要同步加進這個值並重啟 csp。
      ANILA_TRUSTED_HOSTS: "${ANILA_TRUSTED_HOSTS:-gpt-oss-20b,gemma4,nv-embed-proxy,flux2-dev-agent,host.docker.internal}"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      # CSP 對下游 agent 注入這個 header,downstream 用它認 CSP source。
      # 跟 router service 必須同值,缺值直接 fail (避免 prod 部署誤用 dev token)。
      CSP_SERVICE_TOKEN: ${CSP_SERVICE_TOKEN:?CSP_SERVICE_TOKEN must be set}
      # endpoint_url 是 base URL,proxy_service 自己加 ``/v1/chat/completions``
      # 或 ``/v1/embeddings``。**不要**在 URL 結尾加 ``/v1``,否則拼成
      # ``/v1/v1/...`` → 404 → router 端 RemoteProtocolError。
      # auto_seed 會用這條覆寫 DB 既有 row,改完 /models UI 也要同步改。
      AUTO_REGISTER_MODELS: >-
        [{"name":"${LOCAL_LLM_MODEL:-gpt-oss-20b}","display_name":"${LOCAL_LLM_MODEL:-gpt-oss-20b}","model_type":"llm","endpoint_url":"${LOCAL_LLM_BASE_URL:-http://gpt-oss-20b:8000}","api_version":"v1","description":"On-prem local LLM (anila-models-net)"},{"name":"gemma4","display_name":"gemma4","model_type":"llm","endpoint_url":"http://gemma4:8000","api_version":"v1","description":"On-prem gemma4 vLLM (anila-models-net) — Router primary"},{"name":"${LOCAL_EMBEDDING_MODEL:-nvidia/NV-embed-V2}","display_name":"${LOCAL_EMBEDDING_MODEL:-nvidia/NV-embed-V2}","model_type":"embedding","endpoint_url":"${LOCAL_EMBEDDING_BASE_URL:-http://nv-embed-proxy:8000}","api_version":"v1","description":"On-prem NV-embed-V2 via FastAPI shim (anila-models-net)"},{"name":"image-generator","display_name":"圖像繪製","model_type":"agent","endpoint_url":"http://flux2-dev-agent:8000","api_version":"v1","description":"FLUX.2-dev image generation agent","description_for_router":"當使用者要求繪製、產生、設計、畫一張、給我一張圖、視覺化、想看看 XX 的樣子、想要看一張圖等等的時候使用。輸入是使用者的中文自然語言描述,不需要先翻譯,agent 內部會處理。"}]
      # Phase G：agents 表的 declarative 來源(不同於 model_registry,後者是 catalog;
      # agents 表才是 Router /v1/agents 與 DISPATCH 路徑會 join 的權限源)。
      AUTO_REGISTER_AGENTS: >-
        [{"name":"image-generator","endpoint_url":"http://flux2-dev-agent:8000","api_version":"v1","description_for_router":"當使用者要求繪製、產生、設計、畫一張、給我一張圖、視覺化、想看看 XX 的樣子、想要看一張圖等等的時候使用。輸入是使用者的中文自然語言描述,不需要先翻譯,agent 內部會處理。","health_status":"healthy","approval_status":"approved"}]
      # AUTO_SEED_API_KEYS: prod initial 模式只 seed ingestion-worker (系統內部
      # 必需,讓 worker 能呼叫 csp /v1/embeddings)。smoke-user 是 e2e 測試用的
      # 帳號,prod 不需要,已移除。要恢復就把舊 entry 加回來 (參考 .env.dev.local
      # 同步區段或 git history)。
      AUTO_SEED_API_KEYS: >-
        [{"username":"ingestion-worker","email":"ingestion-worker@anila.local","role":"system","key":"${INTERNAL_PLATFORM_API_KEY:?INTERNAL_PLATFORM_API_KEY must be set}","key_name":"ingestion-worker-system-key","models":["${LOCAL_EMBEDDING_MODEL:-nvidia/NV-embed-V2}"]}]
      # is_public / required_roles 互動:
      #   is_public=false → 走 allowlist (admin 手動授權)
      #   is_public=true  → required_roles 過得了的人都看得到
      #   admin 永遠 bypass
      AUTO_REGISTER_LINKS: >-
        [
          {"name":"ANILA LM","url":"/anilalm","icon":"book-open","description":"AI 學習內容生成（podcast / slides / mind map / quiz / report）","sort_order":1,"is_public":false,"required_roles":[]},
          {"name":"Code Server","url":"/codeserver","icon":"code","description":"Browser VS Code — agent 開發整合入口","sort_order":2,"is_public":false,"required_roles":["admin"]},
          {"name":"n8n 工作流程","url":"/n8n","icon":"workflow","description":"自動化工作流程平台 — 排程任務、跨服務串接","sort_order":3,"is_public":true,"required_roles":["developer"]},
          {"name":"GitLab","url":"/gitlab","icon":"git-branch","description":"Git server — agent 程式碼與 issue tracking（ISO 42001 合規必備）","sort_order":4,"is_public":true,"required_roles":["developer"]},
          {"name":"MLSteam","url":"https://aiops.ai.ncsist.org.tw:4443/","icon":"cpu","description":"MLOps 平台 — agent 訓練與部署","sort_order":5,"is_public":true,"required_roles":["developer"]}
        ]
      ANILA_TEMPLATE_DIR: /app/anila-template
      INGESTION_UPLOAD_DIR: /var/anila/ingestion-uploads
      # branch SSO: 中科院憑證卡登入。Prod 強制 card-only,信任 HiPKI driver
      # 處理 PIN/簽章,backend 只 parse PKCS#7 抽 employee_id。Dev 切回:改 .env
      # 把 REQUIRE_CARD_LOGIN_ONLY 設 false 即可重開本機帳密。
      ENABLE_CARD_LOGIN: "${ENABLE_CARD_LOGIN:-true}"
      REQUIRE_CARD_LOGIN_ONLY: "${REQUIRE_CARD_LOGIN_ONLY:-true}"
      # CARD_INITIAL_OWNERS: CSV 員工編號清單,列在裡面的第一次刷卡直接拿到
      # role=owner + is_approved=True (bootstrap)。其他人走 pending 流程。
      # Prod 缺值直接 fail,避免沒人能登入的 bricked 狀態。
      CARD_INITIAL_OWNERS: "${CARD_INITIAL_OWNERS:?CARD_INITIAL_OWNERS must list at least one bootstrap owner employee_id}"
    volumes:
      # anila-agent subtree (github.com/zzw09773/anila-agent) — 模板下載端用。
      # 更新走 git subtree pull/push,見 README §"Updating anila-agent"。
      - ./anila-agent:/app/anila-template:ro
      # 跟 ingestion-worker 共用 inode,不走拷貝。
      - ./share/uploads/ingestion:/var/anila/ingestion-uploads
    extra_hosts:
      # csp 從這條 reach on-host service (e.g. host port 上的 embedding 後備)。
      - "host.docker.internal:host-gateway"
    networks:
      - default
      # 跨 project 的 external network — 解 ``gemma4`` / ``gpt-oss-20b`` /
      # ``nv-embed-proxy`` (在 models/docker-compose.yml)。bootstrap 一次:
      #   docker network create anila-models-net
      - anila-models-net
    depends_on:
      csp-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── Redis (Arq queue for ingestion-worker) ──────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--maxmemory", "256mb"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── ingestion-worker (parse → chunk → embed → pgvector) ─────────────────
  ingestion-worker:
    build:
      context: .
      dockerfile: ingestion-worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://csp_app:csp@csp-db:5432/csp
      REDIS_URL: redis://redis:6379
      # 經由 CSP /v1/embeddings 走 token_usage 計量,不直連模型。
      EMBEDDING_BASE_URL: http://csp:8000/v1
      EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-nvidia/NV-embed-V2}
      EMBEDDING_API_KEY: ${INTERNAL_PLATFORM_API_KEY:?INTERNAL_PLATFORM_API_KEY must be set}
      EMBEDDING_DIM: "4000"
      UPLOAD_DIR: /var/anila/ingestion-uploads
      # judge 路徑要解 AES-encrypted credentials,cipher key 從 SECRET_KEY 派生,
      # **必須**跟 csp 同值,不然每次 judge decrypt 失敗會 silently skip。
      SECRET_KEY: ${CSP_SECRET_KEY:?CSP_SECRET_KEY must be set (same value as csp)}
      ANILA_ALLOW_DEV_SECRET: "${ANILA_ALLOW_DEV_SECRET:-0}"
      ANILA_ALLOW_HTTP_ENDPOINT: "${ANILA_ALLOW_HTTP_ENDPOINT:-0}"
      ANILA_ALLOW_PRIVATE_ENDPOINT: "${ANILA_ALLOW_PRIVATE_ENDPOINT:-0}"
      # VLM image captioning: ingest 時把 [[IMAGE:id]] placeholder 換成 caption
      # 才不會 chart/diagram 變成 [image] token 消失。走 csp /v1 proxy 為了計量。
      ENABLE_IMAGE_CAPTIONS: "${ENABLE_IMAGE_CAPTIONS:-true}"
      VISION_URL: "${VISION_URL:-http://csp:8000/v1}"
      VISION_MODEL: "${VISION_MODEL:-gemma4}"
      VISION_API_KEY: ${INTERNAL_PLATFORM_API_KEY:-sk-internal-worker-changeme}
      VISION_VERIFY_SSL: "${VISION_VERIFY_SSL:-false}"
      VISION_CONCURRENCY: "${VISION_CONCURRENCY:-4}"
      VISION_TIMEOUT_SECONDS: "${VISION_TIMEOUT_SECONDS:-60}"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./share/uploads/ingestion:/var/anila/ingestion-uploads
    depends_on:
      csp-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      csp:
        condition: service_healthy
    restart: unless-stopped

  # ── Router (anila-core-router :9000) ────────────────────────────────────
  router:
    build:
      context: .
      dockerfile: anila-core-router/Dockerfile
    # 不對 host 開 port — 外部走 nginx /router/* → router:9000。
    expose:
      - "9000"
    environment:
      CSP_BASE_URL: http://csp:8000
      # 必須跟 csp 的 CSP_SERVICE_TOKEN 一致 — router 用它走 service-auth endpoint。
      CSP_SERVICE_TOKEN: ${CSP_SERVICE_TOKEN:?CSP_SERVICE_TOKEN must be set (same value as csp)}
      MODEL: ${LLM_MODEL:-gemma4}
    depends_on:
      csp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── nginx (HTTPS reverse proxy, 唯一外部入口) ────────────────────────────
  # TLS termination (self-signed dev cert),HTTP→HTTPS 301,proxy /, /api/,
  # /v1/, /v2/, /router/* 到對應內部 service。
  nginx:
    image: nginx:alpine
    container_name: anila-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${ANILA_UI_HTTPS_PORT:-4443}:4443"
    volumes:
      - ./myCSPPlatform/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./myCSPPlatform/docker/certs:/etc/nginx/certs:ro
      - ./share/static:/usr/share/nginx/share-files/static:ro
      - ./share/uploads:/usr/share/nginx/share-files/uploads:rw
    depends_on:
      # `restart: true` (compose 2.17+): upstream rebuild 後 nginx 跟著 restart,
      # 不然 nginx.conf 的 static upstream block 把舊 IP 釘死 → 502。
      csp:
        condition: service_healthy
        restart: true
      anilalm:
        condition: service_healthy
        restart: true
      router:
        condition: service_healthy
        restart: true
      anila-ui:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── pptx-renderer (Node + LibreOffice for slide / vision-QA screenshots) ─
  pptx-renderer:
    build:
      context: ANILALM/pptx-skill
      dockerfile: Dockerfile
    expose:
      - "7100"
    healthcheck:
      # bookworm-slim 沒 curl/wget,用 node 自帶 http。
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:7100/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ── ANILA LM (Vite/React SPA at /anilalm/) ──────────────────────────────
  anilalm:
    build:
      context: ANILALM
      args:
        BASE_PATH: ${ANILALM_BASE_PATH:-/anilalm/}
        VITE_DEFAULT_CHAT_MODEL: ${ANILALM_DEFAULT_CHAT_MODEL:-gemma4}
    expose:
      - "80"
    depends_on:
      csp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # ── ANILA UI (admin SPA, same-origin via nginx) ─────────────────────────
  anila-ui:
    build:
      context: ANILA_UI/anila-ui
      args:
        # 空字串 → SPA 用相對 URL,所有請求 same-origin (clipboard secure context)。
        VITE_CSP_BASE_URL: ${ANILA_PUBLIC_CSP_BASE_URL-}
        VITE_ROUTER_BASE_URL: ${ANILA_PUBLIC_ROUTER_BASE_URL:-/router}
    expose:
      - "80"
    depends_on:
      csp:
        condition: service_healthy
      router:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # ── code-server (cold-stored) ───────────────────────────────────────────
  # Browser-based VS Code,reachable via /codeserver subpath through nginx.
  # 用 codercom 上游而非 lscr.io/linuxserver fork — 後者多一層 s6-overlay
  # 會破 subpath 部署 (workspace fs provider 註冊失敗)。
  # 解凍前的 TODO:把 PASSWORD 換掉,SSO 接好後改 nginx auth_request 驗 CSP JWT。
  codeserver:
    image: codercom/code-server:latest
    # 1001:1001 對齊 host 'aia' UID,避免容器內存檔 EACCES。
    user: "${UID:-1001}:${GID:-1001}"
    environment:
      TZ: Asia/Taipei
      # startup_security 拒絕 dev 預設 `changeme-codeserver`,prod 必設真值。
      PASSWORD: ${CODESERVER_PASSWORD:?CODESERVER_PASSWORD must be set}
    volumes:
      - codeserver_config:/home/coder/.config
      # 不要掛 repo root — 會把 .env / 私鑰 / credentials 全部暴露給拿到
      # 密碼的人。CODESERVER_WORKSPACE 必須指非機密目錄。
      - ${CODESERVER_WORKSPACE:?CODESERVER_WORKSPACE must point to a non-secret-bearing directory}:/home/coder/workspace
    working_dir: /home/coder/workspace
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ── n8n workflow automation (cold-stored) ───────────────────────────────
  # Subpath /n8n。重要 hardening (不要回退):
  #   - NODE_TLS_REJECT_UNAUTHORIZED 預設 1。要連自簽 endpoint 逐節點設
  #     self-signed CA,**不要**全域關 TLS 驗證 (歷史教訓)。
  #   - Code Node 模組白名單寫死,避免變成任意 require() 的 RCE 平台。
  n8n:
    image: n8nio/n8n:1.98.2
    # 用 image 內建 'node' user (UID 1000),不要 override user — n8n 首次
    # 開機 HOME 對不上會 mkdir /.n8n EACCES。
    environment:
      TZ: Asia/Taipei
      N8N_PATH: /n8n/
      N8N_HOST: ${ANILA_HOST:-172.16.120.35}
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://172.16.120.35/n8n/}
      NODE_TLS_REJECT_UNAUTHORIZED: "${N8N_TLS_REJECT_UNAUTHORIZED:-1}"
      # 後面 nginx 已是 HTTPS,n8n 自己看到 HTTP 所以 cookie 標非 secure 才能登入。
      N8N_SECURE_COOKIE: "false"
      NODE_FUNCTION_ALLOW_EXTERNAL: "${N8N_NODE_FUNCTION_ALLOW_EXTERNAL:-axios,lodash,dayjs}"
      NODE_FUNCTION_ALLOW_BUILTIN: "${N8N_NODE_FUNCTION_ALLOW_BUILTIN:-crypto,url}"
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    expose:
      - "5678"
    healthcheck:
      # /healthz 在引擎 root,不受 N8N_PATH 影響。
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    restart: unless-stopped

  # ── GitLab CE (cold-stored) ─────────────────────────────────────────────
  # Subpath /gitlab via Workhorse:external_url 讓 GitLab 把所有 absolute link
  # 渲染在 subpath 下,內建 nginx disable 讓外面 ANILA nginx 接 8181。
  # 首次開機 reconfigure ~5-10 分鐘,start_period 600s 是必要的。
  # Initial root password 在容器內 /etc/gitlab/initial_root_password,首次登入要輪換。
  gitlab:
    image: gitlab/gitlab-ce:16.10.10-ce.0
    hostname: gitlab.anila.internal
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://${ANILA_HOST:-172.16.120.35:4443}/gitlab'
        nginx['enable'] = false
        gitlab_workhorse['listen_network'] = "tcp"
        gitlab_workhorse['listen_addr'] = "0.0.0.0:8181"
        gitlab_rails['time_zone'] = 'Asia/Taipei'
        # 內網部署 — admin 發帳號,不開 self sign-up。
        gitlab_rails['gitlab_signup_enabled'] = false
        # 省記憶體 — Prometheus + Alertmanager 不啟用。
        prometheus['enable'] = false
        alertmanager['enable'] = false
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    expose:
      - "8181"   # Workhorse for ANILA nginx
      - "22"     # SSH for git push/pull (not host-exposed yet)
    shm_size: 256m
    healthcheck:
      # /-/health 預設只開 127/8 的 monitoring_whitelist,從外部 monitor 看不到。
      # /users/sign_in 不需 auth,Puma 起來就 200,正好當 readiness probe。
      # /gitlab prefix 必要,因為 external_url 設 subpath 後 Workhorse 預期所有 URL 都帶。
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8181/gitlab/users/sign_in || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 600s
    restart: unless-stopped

networks:
  default:
    name: anila-net
  # 跟 models/docker-compose.yml 共用。external → 兩個 project 任一個 down
  # 都不會刪掉它。bootstrap:  docker network create anila-models-net
  anila-models-net:
    external: true
    name: anila-models-net

volumes:
  csp-pgdata:
  redis-data:
  # 下面三組對應 codeserver / n8n / gitlab service。一旦這些 service 解凍,
  # 既有的 anila-platform_<name> volume 會被 compose reuse,資料不會重生。
  codeserver_config:
  n8n_data:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
