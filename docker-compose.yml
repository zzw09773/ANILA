  #     # 變成 RCE 平台。改為僅允許明確列表；若工作流真的需要其他模組，
  #     # 在 .env 透過 N8N_NODE_FUNCTION_ALLOW_EXTERNAL / _BUILTIN 加白名單。
  #     NODE_FUNCTION_ALLOW_EXTERNAL: "${N8N_NODE_FUNCTION_ALLOW_EXTERNAL:-axios,lodash,dayjs}"
