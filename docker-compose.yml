# ANILA Platform — Local Integration & Smoke Test
# NOT for production deployment.
# Standard startup: docker-compose up -d
# All services share the anila-net network.

name: anila-platform

services:

  # ── PostgreSQL for myCSPPlatform ─────────────────────────────────────────────
  csp-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: csp
      POSTGRES_PASSWORD: csp
      POSTGRES_DB: csp
    volumes:
      - csp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csp -d csp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── myCSPPlatform (Control Plane + Data Plane, port 8000) ────────────────────
  # NOTE: On-prem deployments point LOCAL_LLM_BASE_URL at a real landed LLM
  # (e.g. vLLM, Ollama, TGI). The repo no longer ships a mock-openai container;
  # smoke tests run against the real local model.
  csp:
    build:
      context: myCSPPlatform
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Flush stdout/stderr immediately so `docker logs` shows request errors
      # without waiting for buffer fill.
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://csp:csp@csp-db:5432/csp
      SECRET_KEY: ${CSP_SECRET_KEY:-dev-secret-key-change-in-prod}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      # Service-to-service credential: CSP injects this into downstream agent calls.
      # Downstream agents verify this header to accept requests only from CSP.
      CSP_SERVICE_TOKEN: ${CSP_SERVICE_TOKEN:-dev-service-token}
      # LOCAL_LLM_BASE_URL must point at an OpenAI-compatible local endpoint
      # reachable from the csp container (e.g. http://host.docker.internal:11434/v1
      # for host-side Ollama, or an in-cluster vLLM service URL).
      AUTO_REGISTER_MODELS: >-
        [{"name":"${LOCAL_LLM_MODEL:-gpt-4o-mini}","display_name":"${LOCAL_LLM_MODEL:-gpt-4o-mini}","model_type":"llm","endpoint_url":"${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}","api_version":"v1","description":"On-prem local LLM"},{"name":"${LOCAL_EMBEDDING_MODEL:-text-embedding-3-small}","display_name":"${LOCAL_EMBEDDING_MODEL:-text-embedding-3-small}","model_type":"embedding","endpoint_url":"${LOCAL_EMBEDDING_BASE_URL:-${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}}","api_version":"v1","description":"On-prem local embedding model"}]
      AUTO_SEED_API_KEYS: >-
        [{"username":"smoke-user","email":"smoke-user@example.com","role":"user","key":"${SMOKE_USER_API_KEY:-sk-test-user-api-key}","key_name":"smoke-user-dev-key","models":["${LOCAL_LLM_MODEL:-gpt-4o-mini}"]}]
      ANILA_TEMPLATE_DIR: /app/anila-template
    volumes:
      - ./AgenticRAG:/app/anila-template:ro
    depends_on:
      csp-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── ANILA Core Router (port 9000) ─────────────────────────────────────────────
  router:
    build:
      context: .
      dockerfile: anila-core-router/Dockerfile
    ports:
      - "9000:9000"
    environment:
      # Router calls the main LLM through CSP data plane.
      # Registered agents are optional and discovered dynamically from CSP.
      CSP_BASE_URL: http://csp:8000
      MODEL: ${LLM_MODEL:-gpt-4o-mini}
    depends_on:
      csp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── ANILA Runtime UI (port 3000) ──────────────────────────────────────────────
  anila-ui:
    build:
      context: ANILA_UI/anila-ui
      args:
        VITE_CSP_BASE_URL: ${ANILA_PUBLIC_CSP_BASE_URL:-http://localhost:8000}
        VITE_ROUTER_BASE_URL: ${ANILA_PUBLIC_ROUTER_BASE_URL:-http://localhost:9000}
    ports:
      - "${ANILA_UI_PORT:-3001}:80"
    depends_on:
      csp:
        condition: service_healthy
      router:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

networks:
  default:
    name: anila-net

volumes:
  csp-pgdata:
