# ANILA Platform — Local Integration & Smoke Test
# NOT for production deployment.
# Standard startup: docker-compose up -d
# All services share the anila-net network.

name: anila-platform

services:

  # ── PostgreSQL for myCSPPlatform ─────────────────────────────────────────────
  csp-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: csp
      POSTGRES_PASSWORD: csp
      POSTGRES_DB: csp
    volumes:
      - csp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csp -d csp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── myCSPPlatform (Control Plane + Data Plane, port 8000) ────────────────────
  # NOTE: On-prem deployments point LOCAL_LLM_BASE_URL at a real landed LLM
  # (e.g. vLLM, Ollama, TGI). The repo no longer ships a mock-openai container;
  # smoke tests run against the real local model.
  csp:
    build:
      context: myCSPPlatform
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Flush stdout/stderr immediately so `docker logs` shows request errors
      # without waiting for buffer fill.
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://csp:csp@csp-db:5432/csp
      SECRET_KEY: ${CSP_SECRET_KEY:-dev-secret-key-change-in-prod}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      # Service-to-service credential: CSP injects this into downstream agent calls.
      # Downstream agents verify this header to accept requests only from CSP.
      CSP_SERVICE_TOKEN: ${CSP_SERVICE_TOKEN:-dev-service-token}
      # LOCAL_LLM_BASE_URL must point at an OpenAI-compatible local endpoint
      # reachable from the csp container (e.g. http://host.docker.internal:11434/v1
      # for host-side Ollama, or an in-cluster vLLM service URL).
      AUTO_REGISTER_MODELS: >-
        [{"name":"${LOCAL_LLM_MODEL:-gpt-4o-mini}","display_name":"${LOCAL_LLM_MODEL:-gpt-4o-mini}","model_type":"llm","endpoint_url":"${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}","api_version":"v1","description":"On-prem local LLM"},{"name":"${LOCAL_EMBEDDING_MODEL:-text-embedding-3-small}","display_name":"${LOCAL_EMBEDDING_MODEL:-text-embedding-3-small}","model_type":"embedding","endpoint_url":"${LOCAL_EMBEDDING_BASE_URL:-${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}}","api_version":"v1","description":"On-prem local embedding model"}]
      AUTO_SEED_API_KEYS: >-
        [{"username":"smoke-user","email":"smoke-user@example.com","role":"user","key":"${SMOKE_USER_API_KEY:-sk-test-user-api-key}","key_name":"smoke-user-dev-key","models":["${LOCAL_LLM_MODEL:-gpt-4o-mini}"]}]
      # Phase 1 Step 3 multi-service-integration-plan §7.1 — five platform
      # links seeded on startup. URLs are nginx same-origin paths (resolved
      # by the ANILA reverse proxy in front of this stack) except MLSteam
      # which is an external service. is_public/required_roles semantics:
      #
      #   NotebookLM (mode A allowlist):  is_public=false, required_roles=[]
      #     → admin manually grants per-user / per-department (§6.0.1)
      #
      #   Code Server (admin-only):       is_public=false, required_roles=['admin']
      #     → only admin passes role gate; admin bypass already covers
      #
      #   n8n / GitLab / MLSteam (open to developers without grant):
      #                                    is_public=true,  required_roles=['developer']
      #     → 'developer' passes role gate, then is_public bypass; admin
      #     bypass also covers; non-developer users blocked at role gate
      AUTO_REGISTER_LINKS: >-
        [
          {"name":"NotebookLM","url":"/notebooklm","icon":"book-open","description":"AI 學習內容生成（podcast / slides / mind map / quiz / report）","sort_order":1,"is_public":false,"required_roles":[]},
          {"name":"Code Server","url":"/codeserver","icon":"code","description":"Browser VS Code — agent 開發整合入口","sort_order":2,"is_public":false,"required_roles":["admin"]},
          {"name":"n8n 工作流程","url":"/n8n","icon":"workflow","description":"自動化工作流程平台 — 排程任務、跨服務串接","sort_order":3,"is_public":true,"required_roles":["developer"]},
          {"name":"GitLab","url":"/gitlab","icon":"git-branch","description":"Git server — agent 程式碼與 issue tracking（ISO 42001 合規必備）","sort_order":4,"is_public":true,"required_roles":["developer"]},
          {"name":"MLSteam","url":"https://aiops.ai.ncsist.org.tw:4443/","icon":"cpu","description":"MLOps 平台 — agent 訓練與部署","sort_order":5,"is_public":true,"required_roles":["developer"]}
        ]
      ANILA_TEMPLATE_DIR: /app/anila-template
    volumes:
      - ./AgenticRAG:/app/anila-template:ro
    depends_on:
      csp-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── ANILA Core Router (port 9000) ─────────────────────────────────────────────
  router:
    build:
      context: .
      dockerfile: anila-core-router/Dockerfile
    ports:
      - "9000:9000"
    environment:
      # Router calls the main LLM through CSP data plane.
      # Registered agents are optional and discovered dynamically from CSP.
      CSP_BASE_URL: http://csp:8000
      # Shared service token used by router to call CSP's service-auth endpoints
      # (e.g. GET /api/models/router-primary). Must match CSP's CSP_SERVICE_TOKEN.
      CSP_SERVICE_TOKEN: ${CSP_SERVICE_TOKEN:-dev-service-token}
      MODEL: ${LLM_MODEL:-gpt-4o-mini}
    depends_on:
      csp:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── HTTPS Reverse Proxy (ports 80 + 443) ─────────────────────────────────────
  # Single public entry. Terminates TLS with a self-signed cert (temporary),
  # redirects HTTP→HTTPS, and proxies /, /api/, /v1/, /v2/ to csp:8000 inside
  # the anila-net docker network. This restores navigator.clipboard (secure
  # context) and makes API calls same-origin so no more localhost:8000 ECONNREFUSED.
  nginx:
    image: nginx:alpine
    container_name: anila-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${ANILA_UI_HTTPS_PORT:-4443}:4443"
    volumes:
      - ./myCSPPlatform/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./myCSPPlatform/docker/certs:/etc/nginx/certs:ro
    depends_on:
      csp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── ANILA Runtime UI (port 3000) ──────────────────────────────────────────────
  anila-ui:
    build:
      context: ANILA_UI/anila-ui
      args:
        # Empty => ANILA UI uses relative URLs; the `nginx` service fronts
        # both ANILA UI and CSP on https://<host>:4443 so every request is
        # same-origin and clipboard works in secure context.
        VITE_CSP_BASE_URL: ${ANILA_PUBLIC_CSP_BASE_URL-}
        VITE_ROUTER_BASE_URL: ${ANILA_PUBLIC_ROUTER_BASE_URL:-/router}
    expose:
      - "80"
    depends_on:
      csp:
        condition: service_healthy
      router:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # ── code-server (Phase 1 Step 5) ──────────────────────────────────────────────
  # Browser-based VS Code, only reachable via the ANILA nginx at /codeserver/.
  # We deliberately do NOT publish 8443 to the host — same-origin path only.
  # Phase 1 auth: PASSWORD env var (single shared password). Phase 3 will swap
  # to nginx auth_request validating the CSP JWT cookie (see design §5.0.1).
  codeserver:
    image: lscr.io/linuxserver/code-server:latest
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Asia/Taipei
      PASSWORD: ${CODESERVER_PASSWORD:-changeme-codeserver}
      SUDO_PASSWORD: ${CODESERVER_SUDO_PASSWORD:-changeme-codeserver-sudo}
      # PROXY_DOMAIN: code-server uses this to render absolute URLs back at
      # the user. Including the port so the cookie / preview URLs match.
      PROXY_DOMAIN: ${ANILA_HOST:-172.16.120.35:4443}
      DEFAULT_WORKSPACE: /workspace
    volumes:
      - codeserver_config:/config
      - codeserver_workspace:/workspace
    expose:
      - "8443"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8443/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ── GitLab CE (Phase 1 Step 6) ────────────────────────────────────────────────
  # Subpath deployment via Workhorse: external_url tells GitLab to render every
  # absolute link under /gitlab, internal nginx is disabled so the bundled
  # workhorse listens on 8181 for the ANILA nginx to reverse-proxy. First boot
  # runs reconfigure for ~5-10 minutes — start_period accounts for that.
  # Initial root password lives in /etc/gitlab/initial_root_password inside
  # the container; rotate it on first login.
  gitlab:
    image: gitlab/gitlab-ce:16.10.0-ce.0
    hostname: gitlab.anila.internal
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://${ANILA_HOST:-172.16.120.35:4443}/gitlab'
        nginx['enable'] = false
        gitlab_workhorse['listen_network'] = "tcp"
        gitlab_workhorse['listen_addr'] = "0.0.0.0:8181"
        gitlab_rails['time_zone'] = 'Asia/Taipei'
        # Internal LAN deployment — admin issues accounts; no self sign-up.
        gitlab_rails['gitlab_signup_enabled'] = false
        # Trim memory: skip Prometheus + Alertmanager. Re-enable if metrics
        # become a Phase 1 requirement (design §5.0.2 explicitly defers).
        prometheus['enable'] = false
        alertmanager['enable'] = false
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    expose:
      - "8181"   # Workhorse for ANILA nginx
      - "22"     # SSH for git push/pull (not host-exposed yet)
    shm_size: 256m
    healthcheck:
      # GitLab gates /-/health behind monitoring_whitelist (127/8 only by
      # default), which works for an in-container probe but blocks any
      # external monitoring. /users/sign_in is unauthenticated and 200s
      # the moment Puma is serving — exactly what we want for readiness.
      # The /gitlab prefix is required because external_url='.../gitlab'
      # makes Workhorse expect every URL under that subpath.
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8181/gitlab/users/sign_in || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 600s
    restart: unless-stopped

networks:
  default:
    name: anila-net

volumes:
  csp-pgdata:
  codeserver_config:
  codeserver_workspace:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
